name: Compute Match Scores

on:
  schedule:
    - cron: '30 9 * * *'   # 9:30 AM UTC = 5:30 AM EDT, every day
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

jobs:
  compute:
    name: Compute seeker & employer match scores
    runs-on: ubuntu-latest
    timeout-minutes: 20   # First run per seeker: 15 jobs × 2 s ≈ 30 s each; cached runs: <1 min total

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run match computation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # optional — enables LLM keyword extraction
        run: python scripts/compute_matches.py
