name: Enrich Job Keywords (One-Time)

on:
  workflow_dispatch:   # Manual trigger only — run once to populate all jobs

jobs:
  enrich:
    name: Batch-enrich external_opportunities with LLM keywords
    runs-on: ubuntu-latest
    timeout-minutes: 5    # pure Python tokenizer — completes in under 60 seconds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run keyword enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/enrich_keywords.py
