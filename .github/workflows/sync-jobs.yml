name: Sync Job Board

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC = 5 AM EDT, every day
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Scrape & sync Canadian jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Step 1 — Scrape jobs (JobSpy / tls-client)
        run: python scripts/scrape_jobs.py

      - name: Step 2 — Upload to Supabase (fresh process, no tls-client)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 -c "
          import os, urllib.parse
          url = os.environ.get('SUPABASE_URL', '')
          parsed = urllib.parse.urlparse(url)
          print(f'Supabase host: {parsed.hostname}')
          print(f'URL scheme: {parsed.scheme}')
          print(f'URL valid: {bool(parsed.hostname and parsed.scheme == \"https\")}')
          "
          python scripts/upload_jobs.py
